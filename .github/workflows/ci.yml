name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Vet
        shell: pwsh
        run: go vet ./...

      - name: Check go.mod is tidy
        shell: pwsh
        run: |
          go mod tidy
          $diff = git diff --name-only go.mod go.sum
          if ($diff) {
            Write-Host "ERROR: go.mod or go.sum is not tidy. Run 'go mod tidy' and commit."
            git diff go.mod go.sum
            exit 1
          }
          Write-Host "go.mod is tidy"

  build:
    runs-on: windows-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build
        shell: pwsh
        run: ./scripts/build.ps1

      - name: Test
        shell: pwsh
        run: go test ./...

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: kusanagi-windows-${{ github.sha }}
          path: kusanagi.exe
          compression-level: 0
          if-no-files-found: error
