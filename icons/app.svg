<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="screenBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0a1a"/>
      <stop offset="100%" stop-color="#1a0f2e"/>
    </linearGradient>
    <linearGradient id="eyeGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bb86fc"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
    <linearGradient id="apertureGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ce93d8"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
    <linearGradient id="monitorBezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#1a0f2e"/>
    </linearGradient>
    <linearGradient id="standGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d2669"/>
      <stop offset="100%" stop-color="#2d1b4e"/>
    </linearGradient>
    <linearGradient id="pupilGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e1bee7"/>
      <stop offset="100%" stop-color="#bb86fc"/>
    </linearGradient>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Monitor bezel -->
  <rect x="28" y="24" width="200" height="150" rx="14" ry="14" fill="url(#monitorBezel)" stroke="#5e3a8a" stroke-width="1.5"/>

  <!-- Screen area -->
  <rect x="36" y="32" width="184" height="128" rx="6" ry="6" fill="url(#screenBg)"/>

  <!-- Screen grid lines (subtle UI grid on screen) -->
  <g opacity="0.08" stroke="#7c4dff" stroke-width="0.5">
    <line x1="36" y1="64" x2="220" y2="64"/>
    <line x1="36" y1="96" x2="220" y2="96"/>
    <line x1="36" y1="128" x2="220" y2="128"/>
    <line x1="82" y1="32" x2="82" y2="160"/>
    <line x1="128" y1="32" x2="128" y2="160"/>
    <line x1="174" y1="32" x2="174" y2="160"/>
  </g>

  <!-- Circuit traces from monitor edges converging toward eye -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top-left traces -->
    <path d="M60 52 L72 52 L80 60 L88 60" stroke="#bb86fc" stroke-width="1.8" opacity="0.4"/>
    <circle cx="60" cy="52" r="2" fill="#bb86fc" opacity="0.6"/>
    <circle cx="88" cy="60" r="1.5" fill="#bb86fc" opacity="0.4"/>

    <!-- Top-right traces -->
    <path d="M196 52 L184 52 L176 60 L168 60" stroke="#bb86fc" stroke-width="1.8" opacity="0.4"/>
    <circle cx="196" cy="52" r="2" fill="#bb86fc" opacity="0.6"/>
    <circle cx="168" cy="60" r="1.5" fill="#bb86fc" opacity="0.4"/>

    <!-- Bottom-left traces -->
    <path d="M60 148 L72 148 L80 140 L88 140" stroke="#7c4dff" stroke-width="1.8" opacity="0.35"/>
    <circle cx="60" cy="148" r="2" fill="#7c4dff" opacity="0.5"/>
    <circle cx="88" cy="140" r="1.5" fill="#7c4dff" opacity="0.35"/>

    <!-- Bottom-right traces -->
    <path d="M196 148 L184 148 L176 140 L168 140" stroke="#7c4dff" stroke-width="1.8" opacity="0.35"/>
    <circle cx="196" cy="148" r="2" fill="#7c4dff" opacity="0.5"/>
    <circle cx="168" cy="140" r="1.5" fill="#7c4dff" opacity="0.35"/>
  </g>

  <!-- Circuit traces from edges to eye -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5">
    <!-- Left traces -->
    <path d="M60 88 L72 88 L80 80 L96 80" stroke="#bb86fc" stroke-width="1.5"/>
    <circle cx="60" cy="88" r="2" fill="#bb86fc"/>

    <!-- Right traces -->
    <path d="M196 88 L184 88 L176 96 L160 96" stroke="#bb86fc" stroke-width="1.5"/>
    <circle cx="196" cy="88" r="2" fill="#bb86fc"/>

    <!-- Top trace -->
    <path d="M128 52 L128 64" stroke="#bb86fc" stroke-width="1.5"/>
    <circle cx="128" cy="52" r="2" fill="#bb86fc"/>

    <!-- Bottom trace -->
    <path d="M128 148 L128 136" stroke="#7c4dff" stroke-width="1.5"/>
    <circle cx="128" cy="148" r="2" fill="#7c4dff"/>
  </g>

  <!-- Robotic eye - outer aperture ring -->
  <circle cx="128" cy="96" r="38" fill="none" stroke="url(#apertureGrad)" stroke-width="3" opacity="0.7"/>

  <!-- Aperture blades (8 blades) -->
  <g fill="none" stroke="#ce93d8" stroke-width="1.8" opacity="0.5">
    <line x1="104" y1="66" x2="118" y2="74"/>
    <line x1="152" y1="66" x2="138" y2="74"/>
    <line x1="98" y1="82" x2="108" y2="92"/>
    <line x1="158" y1="82" x2="148" y2="92"/>
    <line x1="94" y1="102" x2="106" y2="104"/>
    <line x1="162" y1="102" x2="150" y2="104"/>
    <line x1="106" y1="122" x2="116" y2="114"/>
    <line x1="150" y1="122" x2="140" y2="114"/>
  </g>

  <!-- Eye iris - gradient ring -->
  <circle cx="128" cy="96" r="26" fill="url(#eyeGlow)" opacity="0.85" filter="url(#outerGlow)"/>

  <!-- Eye outer ring detail -->
  <circle cx="128" cy="96" r="27" fill="none" stroke="#bb86fc" stroke-width="2" opacity="0.6"/>
  <circle cx="128" cy="96" r="22" fill="none" stroke="#e1bee7" stroke-width="0.8" opacity="0.4"/>

  <!-- Circuit segments inside eye -->
  <g stroke="#e1bee7" stroke-width="1" opacity="0.4">
    <line x1="120" y1="72" x2="124" y2="78"/>
    <line x1="136" y1="72" x2="132" y2="78"/>
    <line x1="108" y1="84" x2="114" y2="86"/>
    <line x1="148" y1="84" x2="142" y2="86"/>
    <line x1="108" y1="108" x2="114" y2="106"/>
    <line x1="148" y1="108" x2="142" y2="106"/>
    <line x1="120" y1="120" x2="124" y2="114"/>
    <line x1="136" y1="120" x2="132" y2="114"/>
  </g>

  <!-- Pupil -->
  <circle cx="128" cy="96" r="10" fill="url(#pupilGlow)" filter="url(#innerGlow)"/>
  <circle cx="128" cy="96" r="8" fill="#bb86fc" opacity="0.9"/>
  <circle cx="128" cy="96" r="5" fill="#f3e5f5"/>

  <!-- Pupil highlight reflection -->
  <ellipse cx="124" cy="92" rx="3" ry="2" fill="#ffffff" opacity="0.8" transform="rotate(-30 124 92)"/>
  <ellipse cx="132" cy="100" rx="1.5" ry="1" fill="#ffffff" opacity="0.3" transform="rotate(-30 132 100)"/>

  <!-- Circuit traces radiating from eye aperture -->
  <g fill="none" stroke-linecap="round" opacity="0.45">
    <path d="M96 70 L90 64 L90 56" stroke="#bb86fc" stroke-width="1.5"/>
    <circle cx="90" cy="56" r="2" fill="#bb86fc"/>

    <path d="M160 70 L166 64 L166 56" stroke="#bb86fc" stroke-width="1.5"/>
    <circle cx="166" cy="56" r="2" fill="#bb86fc"/>

    <path d="M88 104 L78 108 L72 108" stroke="#7c4dff" stroke-width="1.5"/>
    <circle cx="72" cy="108" r="2" fill="#7c4dff"/>

    <path d="M168 104 L178 108 L184 108" stroke="#7c4dff" stroke-width="1.5"/>
    <circle cx="184" cy="108" r="2" fill="#7c4dff"/>
  </g>

  <!-- Data flow dots moving along circuit traces -->
  <g fill="#bb86fc" opacity="0.7">
    <circle cx="74" cy="64" r="1.5"/>
    <circle cx="82" cy="88" r="1.5"/>
    <circle cx="174" cy="88" r="1.5"/>
    <circle cx="144" cy="60" r="1.5"/>
  </g>

  <!-- Cursor arrow on screen -->
  <g transform="translate(172, 72) rotate(15)" opacity="0.5">
    <polygon points="0,0 4,16 7,12 14,18 17,15 10,9 14,7" fill="#e1bee7"/>
  </g>

  <!-- Monitor stand -->
  <g>
    <!-- Neck -->
    <rect x="118" y="174" width="20" height="18" rx="3" fill="url(#standGrad)"/>
    <!-- Base -->
    <rect x="100" y="188" width="56" height="8" rx="4" fill="url(#standGrad)"/>
    <!-- Base highlight -->
    <rect x="100" y="188" width="56" height="3" rx="2" fill="#5e3a8a" opacity="0.5"/>
  </g>

  <!-- Screen bezel highlight (top edge reflection) -->
  <rect x="36" y="32" width="184" height="2" rx="1" fill="#ffffff" opacity="0.06"/>

  <!-- Power indicator LED on bezel -->
  <circle cx="128" cy="24" r="2.5" fill="#bb86fc" opacity="0.7" filter="url(#outerGlow)"/>
</svg>
